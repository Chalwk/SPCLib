<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>SPCLib Script Browser</title>
    <style>
        :root {
            --bg: #0a0e14;
            --surface: #141b22;
            --surface2: #1c242e;
            --border: #2a3644;
            --accent: #64b5f6;
            --accent2: #ffb74d;
            --text: #c8d6e5;
            --text2: #8899aa;
            --danger: #ef5350;
            --success: #66bb6a;
            --warning: #ffa726;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            --radius: 8px;
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        .header {
            background: var(--surface);
            border-bottom: 2px solid var(--accent);
            padding: 1.2rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--accent2);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.85rem;
            color: var(--accent);
            text-decoration: none;
            padding: 0.3rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface2);
            transition: var(--transition);
            white-space: nowrap;
        }

        .back-btn:hover {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0.4rem 1rem;
            gap: 0.5rem;
            min-width: 240px;
        }

        .search-box:focus-within {
            border-color: var(--accent);
        }

        .search-box input {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 0.9rem;
            width: 100%;
            outline: none;
        }

        .search-box .search-icon {
            color: var(--text2);
            font-size: 0.9rem;
        }

        .search-clear {
            background: none;
            border: none;
            color: var(--text2);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0 0.2rem;
            display: none;
        }

        .search-clear.visible {
            display: inline;
        }

        .search-clear:hover {
            color: var(--danger);
        }

        .stats {
            font-size: 0.85rem;
            color: var(--text2);
            background: var(--surface2);
            padding: 0.3rem 0.8rem;
            border-radius: 12px;
            white-space: nowrap;
        }

        .stats strong {
            color: var(--accent2);
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .tab-nav {
            display: flex;
            gap: 0.25rem;
            margin-bottom: 1.5rem;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 0.3rem;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab-btn {
            padding: 0.6rem 1.4rem;
            border: none;
            background: transparent;
            color: var(--text2);
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            transition: var(--transition);
        }

        .tab-btn:hover {
            color: var(--text);
            background: var(--surface2);
        }

        .tab-btn.active {
            background: var(--accent);
            color: #000;
            font-weight: 600;
        }

        .tab-btn .badge {
            display: inline-block;
            background: rgba(0, 0, 0, 0.15);
            padding: 0.1rem 0.5rem;
            border-radius: 10px;
            font-size: 0.75rem;
            margin-left: 0.4rem;
        }

        .tab-btn.active .badge {
            background: rgba(0, 0, 0, 0.2);
        }

        .category-filters {
            display: flex;
            gap: 0.3rem;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }

        .cat-btn {
            padding: 0.35rem 0.9rem;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text2);
            cursor: pointer;
            border-radius: 16px;
            font-size: 0.8rem;
            transition: var(--transition);
            white-space: nowrap;
            text-transform: capitalize;
        }

        .cat-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .cat-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: 600;
        }

        .script-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }

        .script-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.2rem;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
        }

        .script-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 0.6rem;
            gap: 0.5rem;
        }

        .script-name {
            font-weight: 600;
            font-size: 1rem;
            color: var(--accent);
            word-break: break-word;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            text-decoration: none;
        }

        .script-name:hover {
            text-decoration: underline;
            color: var(--accent2);
        }

        .script-name .ext {
            color: var(--text2);
            font-weight: 400;
        }

        .card-links {
            display: flex;
            gap: 0.4rem;
            flex-shrink: 0;
        }

        .card-link {
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            font-size: 0.75rem;
            text-decoration: none;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            transition: var(--transition);
            white-space: nowrap;
            border: 1px solid transparent;
        }

        .link-source {
            background: var(--surface2);
            color: var(--accent);
            border-color: var(--border);
        }

        .link-source:hover {
            background: var(--accent);
            color: #000;
        }

        .link-release {
            background: var(--accent2);
            color: #000;
            font-weight: 600;
        }

        .link-release:hover {
            opacity: 0.85;
        }

        .short-desc {
            font-size: 0.85rem;
            color: var(--text2);
            margin-bottom: 0.5rem;
            font-style: italic;
        }

        .long-desc {
            font-size: 0.82rem;
            color: var(--text);
            flex-grow: 1;
            line-height: 1.5;
            margin-bottom: 0.8rem;
        }

        .card-meta {
            font-size: 0.7rem;
            color: var(--text2);
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .platform-tag {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .tag-sapp {
            background: #1b5e20;
            color: #a5d6a7;
        }

        .tag-phasor {
            background: #0d3b66;
            color: #90caf9;
        }

        .tag-chimera {
            background: #4a148c;
            color: #ce93d8;
        }

        .tag-release {
            background: #e65100;
            color: #ffe0b2;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text2);
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .empty-state p {
            font-size: 0.95rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text2);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-banner {
            background: #4a1515;
            border: 1px solid var(--danger);
            color: #ef9a9a;
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1rem;
            text-align: center;
        }

        .footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.8rem;
            color: var(--text2);
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .header-inner {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                min-width: unset;
            }

            .script-grid {
                grid-template-columns: 1fr;
            }

            .tab-nav {
                gap: 0.15rem;
            }

            .tab-btn {
                padding: 0.5rem 0.8rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <div class="logo">📚 SPCLib <span>Script Browser</span></div>
        <a href="https://github.com/Chalwk/SPCLib" class="back-btn" title="Go to repository root">← Repo</a>
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input id="searchInput" placeholder="Search scripts..." type="text">
            <button class="search-clear" id="searchClear" title="Clear">✕</button>
        </div>
        <div class="stats" id="statsDisplay">Loading...</div>
    </div>
</header>

<div class="main-container">
    <nav class="tab-nav" id="tabNav"></nav>
    <div class="category-filters" id="categoryFilters"></div>
    <div class="script-grid" id="scriptGrid">
        <div class="loading">
            <div class="spinner"></div>
            <p>Loading script metadata...</p>
        </div>
    </div>
</div>

<footer class="footer">
    <p>© 2026. Jericho Crosby (<a href="https://github.com/Chalwk" target="_blank">Chalwk</a>) - SPCLib Script Browser</p>
</footer>

<script>
    (function () {
        const METADATA_URL = 'https://raw.githubusercontent.com/Chalwk/SPCLib/master/metadata.json';
        const GITHUB_BASE = 'https://github.com/Chalwk/SPCLib/blob/master';
        const RAW_BASE = 'https://raw.githubusercontent.com/Chalwk/SPCLib/master';

        const RELEASE_TAG_MAP = {
            'sapp_server_templates': 'sapp-server-templates',
            'phasor_server_templates': 'phasor-server-templates',
            'laa_patched': 'laa_patched',
            'battle_royale': 'battle_royale',
            'wordbuster': 'wordbuster',
            'admin_manager': 'AdminManager',
            'pre_game': 'PreGame'
        };

        const PLATFORMS = [
            {key: 'SAPP', label: 'SAPP', icon: '🖥', hasCategories: true},
            {key: 'PHASOR', label: 'Phasor', icon: '🖥', hasCategories: true},
            {key: 'CHIMERA', label: 'Chimera', icon: '🖥️', hasCategories: false},
            {key: 'RELEASES', label: 'Releases', icon: '📦', hasCategories: false}
        ];

        const CATEGORY_NAMES = ['admin', 'chat', 'gameplay', 'gametypes', 'modules', 'notifications', 'utility'];

        let metadata = null;
        let activePlatform = 'SAPP';
        let activeCategory = 'all';
        let searchQuery = '';

        const tabNav = document.getElementById('tabNav');
        const categoryFilters = document.getElementById('categoryFilters');
        const scriptGrid = document.getElementById('scriptGrid');
        const searchInput = document.getElementById('searchInput');
        const searchClear = document.getElementById('searchClear');
        const statsDisplay = document.getElementById('statsDisplay');

        function buildSourceUrl(platform, category, fileName) {
            if (platform === 'CHIMERA') {
                return `${GITHUB_BASE}/chimera/global/${fileName}.lua`;
            }
            if (platform === 'RELEASES') {
                const tag = RELEASE_TAG_MAP[fileName] || fileName;
                return `https://github.com/Chalwk/SPCLib/releases/tag/${tag}`;
            }
            return `${GITHUB_BASE}/${platform.toLowerCase()}/${category}/${fileName}.lua`;
        }

        function buildDownloadUrl(platform, category, fileName) {
            if (platform === 'CHIMERA') {
                return `${RAW_BASE}/chimera/global/${fileName}.lua`;
            }
            if (platform === 'RELEASES') {
                return buildSourceUrl(platform, category, fileName);
            }
            return `${RAW_BASE}/${platform.toLowerCase()}/${category}/${fileName}.lua`;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function getPlatformTagClass(platform) {
            const map = {
                'SAPP': 'tag-sapp',
                'PHASOR': 'tag-phasor',
                'CHIMERA': 'tag-chimera',
                'RELEASES': 'tag-release'
            };
            return map[platform] || '';
        }

        function flattenMetadata() {
            const scripts = [];
            for (const platformKey of Object.keys(metadata)) {
                const platformData = metadata[platformKey];
                const platformInfo = PLATFORMS.find(p => p.key === platformKey) || {hasCategories: false};

                if (platformInfo.hasCategories) {
                    for (const [category, scriptsObj] of Object.entries(platformData)) {
                        if (typeof scriptsObj === 'object' && scriptsObj !== null && !Array.isArray(
                            scriptsObj)) {
                            for (const [fileName, scriptData] of Object.entries(scriptsObj)) {
                                scripts.push({
                                    platform: platformKey,
                                    category: category,
                                    fileName: fileName,
                                    shortDescription: scriptData.shortDescription || '',
                                    description: scriptData.description || '',
                                    sourceUrl: buildSourceUrl(platformKey, category, fileName),
                                    downloadUrl: buildDownloadUrl(platformKey, category, fileName),
                                    isRelease: false
                                });
                            }
                        }
                    }
                } else if (platformKey === 'RELEASES') {
                    for (const [fileName, scriptData] of Object.entries(platformData)) {
                        scripts.push({
                            platform: platformKey,
                            category: 'release',
                            fileName: fileName,
                            shortDescription: scriptData.shortDescription || '',
                            description: scriptData.description || '',
                            sourceUrl: buildSourceUrl('RELEASES', '', fileName),
                            downloadUrl: buildDownloadUrl('RELEASES', '', fileName),
                            isRelease: true
                        });
                    }
                } else {
                    for (const [fileName, scriptData] of Object.entries(platformData)) {
                        scripts.push({
                            platform: platformKey,
                            category: 'global',
                            fileName: fileName,
                            shortDescription: scriptData.shortDescription || '',
                            description: scriptData.description || '',
                            sourceUrl: buildSourceUrl(platformKey, 'global', fileName),
                            downloadUrl: buildDownloadUrl(platformKey, 'global', fileName),
                            isRelease: false
                        });
                    }
                }
            }
            return scripts;
        }

        function getFilteredScripts() {
            if (!metadata) return [];
            const allScripts = flattenMetadata();
            const query = searchQuery.toLowerCase().trim();

            return allScripts.filter(script => {
                if (script.platform !== activePlatform) return false;
                if (activePlatform === 'SAPP' || activePlatform === 'PHASOR') {
                    if (activeCategory !== 'all' && script.category !== activeCategory) return false;
                }
                if (query) {
                    const searchable = [
                        script.fileName,
                        script.shortDescription,
                        script.description,
                        script.category
                    ].join(' ').toLowerCase();
                    if (!searchable.includes(query)) return false;
                }
                return true;
            });
        }

        function renderTabs() {
            const platformCounts = {};
            if (metadata) {
                const allScripts = flattenMetadata();
                for (const plat of PLATFORMS) {
                    platformCounts[plat.key] = allScripts.filter(s => s.platform === plat.key).length;
                }
            }

            tabNav.innerHTML = PLATFORMS.map(plat => {
                const count = platformCounts[plat.key] || 0;
                const activeClass = plat.key === activePlatform ? ' active' : '';
                return `
                        <button class="tab-btn${activeClass}" data-platform="${plat.key}">
                            ${plat.icon} ${plat.label}
                            <span class="badge">${count}</span>
                        </button>`;
            }).join('');
        }

        function renderCategoryFilters() {
            if (activePlatform !== 'SAPP' && activePlatform !== 'PHASOR') {
                categoryFilters.innerHTML = '';
                return;
            }

            const allScripts = flattenMetadata();
            const catCounts = {};
            CATEGORY_NAMES.forEach(cat => {
                catCounts[cat] = allScripts.filter(s =>
                    s.platform === activePlatform && s.category === cat
                ).length;
            });
            const total = Object.values(catCounts).reduce((a, b) => a + b, 0);

            let html = `<button class="cat-btn${activeCategory === 'all' ? ' active' : ''}" data-category="all">
                    All <span class="badge">${total}</span></button>`;

            CATEGORY_NAMES.forEach(cat => {
                const count = catCounts[cat] || 0;
                const activeClass = cat === activeCategory ? ' active' : '';
                if (count > 0 || metadata) {
                    html += `<button class="cat-btn${activeClass}" data-category="${cat}">
                            ${cat} <span class="badge">${count}</span></button>`;
                }
            });
            categoryFilters.innerHTML = html;
        }

        function renderScripts() {
            const scripts = getFilteredScripts();

            if (!metadata) {
                scriptGrid.innerHTML = `
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>Loading script metadata...</p>
                        </div>`;
                return;
            }

            if (scripts.length === 0) {
                scriptGrid.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📭</div>
                            <p>No scripts found matching your criteria.</p>
                            <p style="font-size:0.85rem;margin-top:0.5rem;">Try adjusting your search or filters.</p>
                        </div>`;
            } else {
                scriptGrid.innerHTML = scripts.map(script => {
                    const displayName = script.isRelease ?
                        script.fileName.replace(/_/g, ' ') :
                        script.fileName;
                    const platformTagClass = getPlatformTagClass(script.platform);
                    const downloadAttr = script.isRelease ? '' : ' download';

                    return `
                        <div class="script-card" data-platform="${script.platform}" data-category="${script.category}">
                            <div class="card-header">
                                <a href="${script.downloadUrl}" class="script-name"${downloadAttr}>
                                    ${escapeHtml(displayName)}<span class="ext">${script.isRelease ? '.zip' : '.lua'}</span>
                                </a>
                                <div class="card-links">
                                    ${script.isRelease
                        ? `<a href="${script.sourceUrl}" target="_blank" class="card-link link-release">⬇ Release</a>`
                        : `<a href="${script.sourceUrl}" target="_blank" class="card-link link-source">📄 View Script</a>`
                    }
                                </div>
                            </div>
                            ${script.shortDescription ? `<p class="short-desc">${escapeHtml(script.shortDescription)}</p>` : ''}
                            ${script.description ? `<p class="long-desc">${escapeHtml(script.description)}</p>` : ''}
                            <div class="card-meta">
                                <span class="platform-tag ${platformTagClass}">${script.platform}</span>
                                ${!script.isRelease && script.category !== 'global' ? `<span>📁 ${script.category}</span>` : ''}
                            </div>
                        </div>`;
                }).join('');
            }

            updateStats(scripts.length);
        }

        function updateStats(visibleCount) {
            const total = metadata ? flattenMetadata().length : 0;
            const platformTotal = metadata ?
                flattenMetadata().filter(s => s.platform === activePlatform).length : 0;
            statsDisplay.innerHTML =
                `Showing <strong>${visibleCount}</strong> of <strong>${platformTotal}</strong> scripts (Total: <strong>${total}</strong>)`;
        }

        function renderAll() {
            renderTabs();
            renderCategoryFilters();
            renderScripts();
        }

        tabNav.addEventListener('click', function (e) {
            const btn = e.target.closest('.tab-btn');
            if (!btn) return;
            const platform = btn.getAttribute('data-platform');
            if (platform && platform !== activePlatform) {
                activePlatform = platform;
                activeCategory = 'all';
                searchInput.value = '';
                searchQuery = '';
                searchClear.classList.remove('visible');
                renderAll();
            }
        });

        categoryFilters.addEventListener('click', function (e) {
            const btn = e.target.closest('.cat-btn');
            if (!btn) return;
            const category = btn.getAttribute('data-category');
            if (category && category !== activeCategory) {
                activeCategory = category;
                renderAll();
            }
        });

        searchInput.addEventListener('input', function () {
            searchQuery = this.value;
            if (searchQuery.trim()) {
                searchClear.classList.add('visible');
            } else {
                searchClear.classList.remove('visible');
            }
            renderScripts();
        });

        searchClear.addEventListener('click', function () {
            searchInput.value = '';
            searchQuery = '';
            searchClear.classList.remove('visible');
            renderScripts();
            searchInput.focus();
        });

        document.addEventListener('keydown', function (e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                searchInput.focus();
            }
        });

        async function fetchMetadata() {
            try {
                const response = await fetch(METADATA_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                metadata = await response.json();
            } catch (err) {
                console.error('Failed to fetch metadata:', err);
                scriptGrid.innerHTML = `
                        <div class="error-banner">
                            <p>⚠️ Failed to load script metadata from GitHub.</p>
                            <p style="font-size:0.85rem;margin-top:0.5rem;">
                                Please check your connection or try again later.
                                <br><a href="${METADATA_URL}" target="_blank" style="color:#90caf9;">View raw metadata.json</a>
                            </p>
                        </div>`;
                statsDisplay.textContent = 'Error loading data';
            }
            renderAll();
        }

        renderTabs();
        fetchMetadata();
    })();
</script>
</body>
</html>
