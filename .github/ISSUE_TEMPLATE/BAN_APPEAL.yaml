name: Ban Appeal
description: Submit a report to appeal a ban from the SPCLib Discord or Halo servers.
title: "Ban Appeal for: <name>"
labels: [ "Ban Appeal" ]
assignees: Chalwk
body:
  - type: markdown
    attributes:
      value: |
        **🔍 Find Your Ban ID**
        > Before submitting, locate your ban in the [Ban Registry](https://chalwk.github.io/SPCLib/tools/community-bans).
        > You will need your **Ban ID** to complete this form. The Ban ID is shown in the first column of the table.
        >
        > **📌 Describe the reason for your ban**
        > Provide a clear and concise description of the events leading to your ban.
        > Use headers (`#`) or lists (`-`) to organize your thoughts.
  - type: input
    id: ban-id
    attributes:
      label: 🆔 Ban ID
      description: Your unique Ban ID as shown in the Ban Registry.
      placeholder: "e.g., 12345"
    validations:
      required: true
  - type: textarea
    id: why-should-we-unban-you
    attributes:
      label: 🔍 Why should we unban you?
      description: Explain why you believe you should be reinstated on the SPCLib Discord or Halo servers.
      placeholder: "Write your reason here"
    validations:
      required: true
  - type: input
    id: contact-info
    attributes:
      label: ✔️ Contact Information
      description: Provide your Discord username and Halo gamertag/username for verification.
      placeholder: "Discord: YourUsername | Halo: YourGamertag"
    validations:
      required: true
  - type: input
    id: user-id
    attributes:
      label: 🆔 User ID (Optional)
      description: If you know your User ID from the Ban Registry, please provide it.
      placeholder: "e.g., abc123"
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        **📷 Screenshots or Logs**
        > Include any relevant screenshots, or evidence that may support your appeal.
        >
        > 🙌 Thank you
        >
        > **We appreciate your effort in appealing your ban from the SPCLib community. Your input helps us maintain a fair and enjoyable environment for everyone.**