name: Build Maps

on:
  push:
    tags:
      - 'SPCLib-maps v*.*.*'

jobs:
  download-and-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create map directories
        run: |
          mkdir -p mosh_pit_maps parkour_maps uber_racing_maps zombies_maps

      - name: Download maps from HAC2 repo
        run: |
          # Read data/maps.txt line by line
          while IFS=';' read -r category mapname rest; do
            # Skip empty lines or comments
            [[ -z "$category" || "$category" == \#* ]] && continue

            # Trim whitespace
            category=$(echo "$category" | xargs)
            mapname=$(echo "$mapname" | xargs)

            # Determine target directory based on category
            case "$category" in
              MOSH_PIT)
                target_dir="mosh_pit_maps"
                ;;
              PARKOUR)
                target_dir="parkour_maps"
                ;;
              UBER_RACING)
                target_dir="uber_racing_maps"
                ;;
              ZOMBIES)
                target_dir="zombies_maps"
                ;;
              *)
                echo "Unknown category '$category' - skipping line"
                continue
                ;;
            esac

            # Build download URL
            url="https://maps.halonet.net/maps/${mapname}.zip"
            output="${target_dir}/${mapname}.zip"

            echo "Downloading $category map: $mapname from $url"

            # Download with curl, follow redirects, fail on HTTP error but continue script
            if curl -L --fail -o "$output" "$url"; then
              echo "✅ Successfully downloaded $mapname"
            else
              echo "❌ Failed to download $mapname (HTTP error or file not found)"
            fi

          done < data/maps.txt

      - name: Package MOSH_PIT.zip
        run: |
          cd mosh_pit_maps
          zip -r ../MOSH_PIT.zip .
          echo "MOSH_PIT.zip created with $(ls -1 | wc -l) maps"
          cd ..

      - name: Package PARKOUR.zip
        run: |
          cd parkour_maps
          zip -r ../PARKOUR.zip .
          echo "PARKOUR.zip created with $(ls -1 | wc -l) maps"
          cd ..

      - name: Package UBER_RACING.zip
        run: |
          cd uber_racing_maps
          zip -r ../UBER_RACING.zip .
          echo "UBER_RACING.zip created with $(ls -1 | wc -l) maps"
          cd ..

      - name: Package ZOMBIES.zip
        run: |
          cd zombies_maps
          zip -r ../ZOMBIES.zip .
          echo "ZOMBIES.zip created with $(ls -1 | wc -l) maps"
          cd ..

      - name: Upload assets to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MOSH_PIT.zip
            PARKOUR.zip
            UBER_RACING.zip
            ZOMBIES.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}